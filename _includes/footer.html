{%- comment -%}
  Optional manual theme toggle. Site works fully without JS (system
  preference via CSS); this just lets a visitor override it.
{%- endcomment -%}
<script>
  (function () {
    function current() {
      return (
        document.documentElement.getAttribute("data-theme") ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
      );
    }
    function label() {
      var el = document.querySelector("[data-theme-label]");
      if (el) el.textContent = current() === "dark" ? "Light" : "Dark";
    }
    window.__toggleTheme = function () {
      var next = current() === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      try { localStorage.setItem("theme", next); } catch (e) {}
      label();
    };
    label();
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", label);
  })();
</script>
