---
layout: default
---
<article>
  <h1>{{ page.title }}</h1>
  {% if page.cover %}
  <p><img src="{{ page.cover }}" alt="{{ page.title }}"></p>
  {% endif %}
  {{ content }}
  {% if page.urls %}
  <h2>Get the book</h2>
  <ul>
    {% for link in page.urls %}
    <li><a href="{{ link.url }}">{{ link.label }}</a></li>
    {% endfor %}
  </ul>
  {% endif %}
</article>
